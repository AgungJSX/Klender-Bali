<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Bali Agung | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalender-bali-agung@2.5.3/dist/kalender-bali-agung.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-rose-600 rounded-lg flex items-center justify-center text-white shadow-md">
                        <i class="fa-solid fa-om text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl text-slate-900 leading-tight">Kalender Bali Agung</h1>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Enterprise Engine</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-600/20">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        System Active
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main x-data="kalenderApp" class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col" x-cloak>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow">
            
            <div class="lg:col-span-8 flex flex-col gap-8">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-center">
                        <div class="inline-flex items-center bg-white border border-slate-200 rounded-2xl shadow-sm p-1.5 w-full sm:w-auto">
                            <button @click="prevMonth" class="w-12 h-10 flex items-center justify-center rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-colors focus:outline-none">
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>
                            <div class="flex items-center px-4 border-x border-slate-100 mx-1 flex-1 sm:flex-none justify-center">
                                <select x-model.number="currentMonth" @change="generateGrid" class="bg-transparent text-slate-800 text-base font-extrabold outline-none cursor-pointer hover:text-rose-600 transition-colors text-center text-center-last">
                                    <template x-for="(bulan, index) in MONTHS" :key="index">
                                        <option :value="index" x-text="bulan" class="text-left"></option>
                                    </template>
                                </select>
                                <span class="text-slate-300 mx-2 font-light">/</span>
                                <input type="number" x-model.number="currentYear" @input="generateGrid" class="w-16 bg-transparent text-slate-800 text-base font-extrabold outline-none text-center hover:text-rose-600 transition-colors focus:text-rose-600">
                            </div>
                            <button @click="nextMonth" class="w-12 h-10 flex items-center justify-center rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-colors focus:outline-none">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                    <div class="p-6 sm:p-8">
                        <div class="grid grid-cols-7 gap-2 text-center font-bold text-xs text-slate-400 mb-6 uppercase tracking-wider">
                            <div class="text-rose-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-slate-600">Sab</div>
                        </div>
                        <div class="grid grid-cols-7 gap-2 sm:gap-3 text-center">
                            <template x-for="(day, index) in days" :key="index">
                                <div class="aspect-square flex items-center justify-center">
                                    <template x-if="day">
                                        <button 
                                            @click="selectDate(day)"
                                            :class="{
                                                'bg-rose-600 text-white shadow-lg shadow-rose-600/30 scale-110 font-bold ring-4 ring-rose-50': isSelected(day),
                                                'bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200': !isSelected(day),
                                                'text-rose-600 font-bold bg-rose-50/50 border-rose-100': index % 7 === 0 && !isSelected(day)
                                            }"
                                            class="w-full h-full rounded-2xl flex items-center justify-center transition-all duration-200 text-base sm:text-lg">
                                            <span x-text="day"></span>
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl"></div>
                    <div class="flex-1 relative z-10 text-center md:text-left">
                        <h3 class="font-bold text-lg text-slate-900 mb-1 flex items-center justify-center md:justify-start gap-2">
                            <i class="fa-solid fa-file-csv text-emerald-600"></i> Export Dataset CSV
                        </h3>
                        <p class="text-sm text-slate-500">Generate kumpulan data Wariga secara masif berdasarkan rentang tahun.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto relative z-10">
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-200 w-full sm:w-auto">
                            <input type="number" x-model="csvStartYear" class="w-full sm:w-20 bg-transparent px-3 py-2 text-center font-bold text-slate-700 outline-none">
                            <span class="text-slate-300 font-bold px-1">-</span>
                            <input type="number" x-model="csvEndYear" class="w-full sm:w-20 bg-transparent px-3 py-2 text-center font-bold text-slate-700 outline-none">
                        </div>
                        <button 
                            @click="downloadCSV" 
                            :disabled="isGenerating"
                            class="w-full sm:w-auto bg-slate-900 hover:bg-rose-600 text-white px-6 py-3 rounded-xl font-bold shadow-md shadow-slate-900/10 transition-all flex items-center justify-center disabled:opacity-50 whitespace-nowrap">
                            <template x-if="!isGenerating">
                                <span><i class="fa-solid fa-download mr-2"></i>Export</span>
                            </template>
                            <template x-if="isGenerating">
                                <span><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Processing...</span>
                            </template>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 h-full sticky top-24 overflow-hidden flex flex-col">
                    <div class="bg-slate-900 p-8 text-center text-white relative overflow-hidden">
                        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white/5 blur-2xl"></div>
                        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-rose-500/20 blur-xl"></div>
                        <div class="relative z-10">
                            <div class="inline-block bg-white/10 backdrop-blur-md border border-white/10 px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase mb-5" x-text="selectedDateString"></div>
                            <template x-if="baliData">
                                <div>
                                    <h3 class="text-3xl sm:text-4xl font-black mb-3 tracking-tight" x-text="baliData.saptawara + ' ' + baliData.pancawara"></h3>
                                    <div class="text-slate-400 font-semibold text-sm flex items-center justify-center gap-3">
                                        <span>Wuku <span x-text="baliData.wuku" class="text-white font-bold ml-1"></span></span>
                                        <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                        <span>Saka <span x-text="baliData.saka" class="text-white font-bold ml-1"></span></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="p-6 sm:p-8 flex-grow flex flex-col gap-4">
                        <template x-if="baliData">
                            <div class="space-y-4">
                                <div class="bg-slate-50 rounded-2xl p-5 border border-slate-100 flex items-center justify-between">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-xl bg-white border border-slate-200 text-amber-500 flex items-center justify-center shadow-sm text-xl">
                                            <i class="fa-solid fa-moon"></i>
                                        </div>
                                        <div>
                                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Sasih</div>
                                            <div class="font-bold text-slate-900 text-lg leading-none" x-text="baliData.sasih"></div>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1" x-text="baliData.fase"></div>
                                        <div class="font-bold text-slate-900 text-lg leading-none" x-text="baliData.angkaFase"></div>
                                    </div>
                                </div>

                                <template x-if="baliData.purnama !== ''">
                                    <div class="bg-rose-50 text-rose-700 rounded-2xl p-3.5 text-center font-bold text-sm tracking-wider border border-rose-100 uppercase flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-star text-rose-400"></i>
                                        <span x-text="baliData.purnama"></span>
                                        <i class="fa-solid fa-star text-rose-400"></i>
                                    </div>
                                </template>

                                <div class="grid grid-cols-2 gap-3 mt-4">
                                    <div class="p-4 bg-white rounded-2xl border border-slate-100 text-center shadow-sm hover:shadow-md transition-shadow">
                                        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1.5">Triwara</div>
                                        <div class="text-slate-800 font-bold text-sm" x-text="baliData.triwara"></div>
                                    </div>
                                    <div class="p-4 bg-white rounded-2xl border border-slate-100 text-center shadow-sm hover:shadow-md transition-shadow">
                                        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1.5">Sadwara</div>
                                        <div class="text-slate-800 font-bold text-sm" x-text="baliData.sadwara"></div>
                                    </div>
                                    <div class="p-4 bg-white rounded-2xl border border-slate-100 text-center shadow-sm hover:shadow-md transition-shadow">
                                        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1.5">Astawara</div>
                                        <div class="text-slate-800 font-bold text-sm" x-text="baliData.astawara"></div>
                                    </div>
                                    <div class="p-4 bg-white rounded-2xl border border-slate-100 text-center shadow-sm hover:shadow-md transition-shadow">
                                        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1.5">Sangawara</div>
                                        <div class="text-slate-800 font-bold text-sm" x-text="baliData.sangawara"></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-16 pt-8 pb-4 border-t border-slate-200 flex flex-col items-center gap-6">
            <a href="https://www.npmjs.com/package/kalender-bali-agung" target="_blank" class="group inline-flex items-center gap-3 bg-white border border-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold hover:bg-rose-50 hover:border-rose-200 hover:text-rose-600 transition-all shadow-sm">
                <i class="fa-brands fa-npm text-3xl text-rose-600 group-hover:scale-110 transition-transform"></i>
                <div class="text-left leading-tight">
                    <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider group-hover:text-rose-400">Available on NPM</span>
                    <span class="block text-sm">kalender-bali-agung</span>
                </div>
            </a>
            <div class="text-center">
                <p class="text-sm text-slate-500 font-medium">
                    Developed by <span class="font-bold text-slate-800">Agung Developer</span>
                </p>
                <p class="text-xs text-slate-400 mt-1">Preserving Balinese Culture through Code.</p>
            </div>
        </footer>
    </main>

    <script>
        const WUKU = ["", "Sinta", "Landep", "Ukir", "Kulantir", "Tolu", "Gumbreg", "Wariga", "Warigadean", "Julungwangi", "Sungsang", "Dungulan", "Kuningan", "Langkir", "Medangsia", "Pujut", "Pahang", "Krulut", "Merakih", "Tambir", "Medangkungan", "Matal", "Uye", "Menail", "Prangbakat", "Bala", "Ugu", "Wayang", "Kelawu", "Dukut", "Watugunung"]
        const EKAWARA = ["", "Luang", ""]
        const DWIWARA = ["", "Menga", "Pepet"]
        const TRIWARA = ["", "Pasah", "Beteng", "Kajeng"]
        const CATURWARA = ["", "Sri", "Laba", "Jaya", "Mandala"]
        const PANCAWARA = ["", "Umanis", "Paing", "Pon", "Wage", "Kliwon"]
        const SADWARA = ["", "Tungleh", "Aryang", "Wurukung", "Paniron", "Was", "Maulu"]
        const SAPTAWARA = ["Redite", "Soma", "Anggara", "Buda", "Wraspati", "Sukra", "Saniscara"]
        const ASTAWARA = ["", "Sri", "Indra", "Guru", "Yama", "Ludra", "Brahma", "Kala", "Uma"]
        const SANGAWARA = ["", "Dangu", "Jagur", "Gigis", "Nohan", "Ogan", "Erangan", "Urungan", "Tulus", "Dadi"]
        const DASAWARA = ["", "Pandita", "Pati", "Suka", "Duka", "Sri", "Manu", "Manusa", "Raja", "Dewa", "Raksasa"]
        const SASIH = ["", "Kasa", "Karo", "Katiga", "Kapat", "Kalima", "Kanem", "Kapitu", "Kawalu", "Kasanga", "Kadasa", "Jyestha", "Sadha"]
        const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"]

        document.addEventListener('alpine:init', () => {
            Alpine.data('kalenderApp', () => ({
                currentMonth: new Date().getMonth(),
                currentYear: new Date().getFullYear(),
                days: [],
                selectedDate: new Date(),
                baliData: null,
                isGenerating: false,
                csvStartYear: new Date().getFullYear(),
                csvEndYear: new Date().getFullYear() + 15,
                MONTHS: MONTHS,

                init() {
                    this.generateGrid()
                    this.selectDate(this.selectedDate.getDate())
                },
                
                generateGrid() {
                    if (!this.currentYear) return
                    let firstDay = new Date(this.currentYear, this.currentMonth, 1).getDay()
                    let daysInMonth = new Date(this.currentYear, this.currentMonth + 1, 0).getDate()
                    this.days = []
                    for(let i = 0; i < firstDay; i++) this.days.push(null)
                    for(let i = 1; i <= daysInMonth; i++) this.days.push(i)
                    if (this.selectedDate.getMonth() === this.currentMonth && this.selectedDate.getFullYear() === this.currentYear) {
                        this.selectDate(this.selectedDate.getDate())
                    } else {
                        this.selectDate(1)
                    }
                },
                
                prevMonth() {
                    if(this.currentMonth === 0) { this.currentMonth = 11; this.currentYear-- } 
                    else { this.currentMonth-- }
                    this.generateGrid()
                },
                
                nextMonth() {
                    if(this.currentMonth === 11) { this.currentMonth = 0; this.currentYear++ } 
                    else { this.currentMonth++ }
                    this.generateGrid()
                },

                isSelected(d) {
                    return this.selectedDate.getDate() === d && this.selectedDate.getMonth() === this.currentMonth && this.selectedDate.getFullYear() === this.currentYear
                },
                
                get selectedDateString() {
                    return `${this.selectedDate.getDate()} ${MONTHS[this.selectedDate.getMonth()]} ${this.selectedDate.getFullYear()}`
                },

                selectDate(d) {
                    if(!d) return
                    this.selectedDate = new Date(this.currentYear, this.currentMonth, d)
                    let m = String(this.currentMonth + 1).padStart(2, '0')
                    let dayStr = String(d).padStart(2, '0')
                    let sc = new KalenderBaliAgung(`${this.currentYear}-${m}-${dayStr}`)
                    
                    this.baliData = {
                        saka: sc.tahunSaka,
                        wuku: WUKU[sc.noWuku] || "-",
                        pancawara: PANCAWARA[sc.noPancawara] || "-",
                        saptawara: SAPTAWARA[sc.noSaptawara] || "-",
                        sasih: (sc.isNampih ? "Mala " : "") + (SASIH[sc.noSasih] || "-"),
                        fase: sc.isPangelong ? "Pengelong" : "Penanggal",
                        angkaFase: sc.penanggalStr,
                        purnama: sc.statusPurnama || "",
                        triwara: TRIWARA[sc.noTriwara] || "-",
                        sadwara: SADWARA[sc.noSadwara] || "-",
                        astawara: ASTAWARA[sc.noAstawara] || "-",
                        sangawara: SANGAWARA[sc.noSangawara] || "-"
                    }
                },

                downloadCSV() {
                    this.isGenerating = true
                    setTimeout(() => {
                        let csv = "tanggal,bulan,tahun,wuku,eka_wara,dwi_wara,tri_wara,catur_wara,panca_wara,sad_wara,sapta_wara,asta_wara,sanga_wara,dasa_wara,sasih,penanggal,pengelong,status_purnama,status_mala\n"
                        let start = new Date(Date.UTC(this.csvStartYear, 0, 1))
                        let end = new Date(Date.UTC(this.csvEndYear, 11, 31))

                        while(start <= end) {
                            let d = start.getUTCDate()
                            let m = start.getUTCMonth() + 1
                            let y = start.getUTCFullYear()
                            let dateStr = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
                            let sc = new KalenderBaliAgung(dateStr)
                            
                            let statusMala = sc.isNampih ? `Mala ${SASIH[sc.noSasih]}` : ""
                            let penanggal = sc.isPangelong ? "0" : sc.penanggalStr
                            let pengelong = sc.isPangelong ? sc.penanggalStr : "0"

                            csv += `${d},${m},${y},${WUKU[sc.noWuku]||""},${EKAWARA[sc.noEkawara]||""},${DWIWARA[sc.noDwiwara]||""},${TRIWARA[sc.noTriwara]||""},${CATURWARA[sc.noCaturwara]||""},${PANCAWARA[sc.noPancawara]||""},${SADWARA[sc.noSadwara]||""},${SAPTAWARA[sc.noSaptawara]||""},${ASTAWARA[sc.noAstawara]||""},${SANGAWARA[sc.noSangawara]||""},${DASAWARA[sc.noDasawara]||""},${SASIH[sc.noSasih]||""},${penanggal},${pengelong},${sc.statusPurnama||""},${statusMala}\n`
                            start.setUTCDate(start.getUTCDate() + 1)
                        }

                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
                        const link = document.createElement("a")
                        link.setAttribute("href", URL.createObjectURL(blob))
                        link.setAttribute("download", `wariga_dataset_${this.csvStartYear}_${this.csvEndYear}.csv`)
                        link.style.visibility = 'hidden'
                        document.body.appendChild(link)
                        link.click()
                        document.body.removeChild(link)

                        this.isGenerating = false
                    }, 50)
                }
            }))
        })
    </script>
</body>
</html>
