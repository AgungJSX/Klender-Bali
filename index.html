<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Bali | Enterprise Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalender-bali-agung@2.5.3/dist/kalender-bali-agung.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="glass-header sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-rose-600 to-red-700 rounded-xl flex items-center justify-center text-white shadow-lg shadow-rose-500/30">
                        <i class="fa-solid fa-om text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-lg sm:text-xl text-slate-900 tracking-tight">Kalender Bali Agung</h1>
                        <p class="text-[10px] font-bold text-rose-600 uppercase tracking-widest">Enterprise Edition</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 border border-emerald-200">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        Engine Stabilized
                    </span>
                    <a href="https://www.npmjs.com/package/kalender-bali-agung" target="_blank" class="text-slate-400 hover:text-rose-600 transition-colors" title="NPM Package">
                        <i class="fa-brands fa-npm text-3xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main x-data="kalenderApp" class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col" x-cloak>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow">
            
            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50 border-b border-slate-200 p-4 sm:p-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-2 bg-white rounded-xl shadow-sm border border-slate-200 p-1 w-full sm:w-auto">
                            <button @click="prevMonth" class="w-10 h-10 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors">
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>
                            <div class="w-px h-6 bg-slate-200 mx-1"></div>
                            <button @click="nextMonth" class="w-10 h-10 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>

                        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                            <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full sm:w-auto focus-within:ring-2 focus-within:ring-rose-500 focus-within:border-rose-500 transition-all">
                                <select x-model.number="viewMonth" class="bg-transparent text-slate-800 font-bold py-2.5 px-4 outline-none cursor-pointer border-r border-slate-200 flex-grow sm:flex-none">
                                    <template x-for="(bulan, index) in MONTHS" :key="index">
                                        <option :value="index" x-text="bulan"></option>
                                    </template>
                                </select>
                                <input type="number" x-model.number="viewYear" @keydown.enter="applyFilter" class="w-full sm:w-24 bg-transparent text-slate-800 font-bold py-2.5 px-4 outline-none text-center placeholder-slate-400" placeholder="Tahun">
                            </div>
                            <button @click="applyFilter" class="w-full sm:w-auto bg-slate-900 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-filter text-sm"></i> Terapkan
                            </button>
                        </div>
                    </div>

                    <div class="p-4 sm:p-8">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-black text-slate-900 tracking-tight" x-text="MONTHS[activeMonth] + ' ' + activeYear"></h2>
                        </div>

                        <div class="grid grid-cols-7 gap-1 sm:gap-2 text-center font-extrabold text-[10px] sm:text-xs text-slate-400 mb-3 uppercase tracking-widest">
                            <div class="text-rose-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-slate-500">Sab</div>
                        </div>

                        <div class="grid grid-cols-7 gap-1 sm:gap-2 text-center">
                            <template x-for="(day, index) in days" :key="index">
                                <div class="aspect-square flex items-center justify-center">
                                    <template x-if="day">
                                        <button 
                                            @click="selectDate(day)"
                                            :class="{
                                                'bg-rose-600 text-white shadow-lg shadow-rose-600/40 scale-105 font-black ring-2 ring-offset-2 ring-rose-600': isSelected(day),
                                                'bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 font-bold': !isSelected(day),
                                                'text-rose-600 bg-rose-50/50 border-rose-100': index % 7 === 0 && !isSelected(day)
                                            }"
                                            class="w-full h-full rounded-xl flex items-center justify-center transition-all duration-200 text-sm sm:text-lg">
                                            <span x-text="day"></span>
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8 flex flex-col lg:flex-row items-center justify-between gap-6">
                    <div class="flex-1 text-center lg:text-left">
                        <h3 class="font-bold text-lg text-slate-900 mb-1 flex items-center justify-center lg:justify-start gap-2">
                            <i class="fa-solid fa-cloud-arrow-down text-emerald-600"></i> Export Engine
                        </h3>
                        <p class="text-xs font-medium text-slate-500">Generate dataset Wariga lengkap format CSV berdasarkan rentang tahun.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-200 w-full sm:w-auto focus-within:ring-2 focus-within:ring-emerald-500 transition-all">
                            <input type="number" x-model="csvStartYear" class="w-full sm:w-20 bg-transparent px-3 py-2 text-center font-bold text-slate-700 outline-none">
                            <span class="text-slate-300 font-bold px-1"><i class="fa-solid fa-arrow-right-long text-xs"></i></span>
                            <input type="number" x-model="csvEndYear" class="w-full sm:w-20 bg-transparent px-3 py-2 text-center font-bold text-slate-700 outline-none">
                        </div>
                        <button 
                            @click="downloadCSV" 
                            :disabled="isGenerating"
                            class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-md shadow-emerald-600/20 transition-all flex items-center justify-center disabled:opacity-50 whitespace-nowrap">
                            <template x-if="!isGenerating">
                                <span><i class="fa-solid fa-file-csv mr-2"></i>Export CSV</span>
                            </template>
                            <template x-if="isGenerating">
                                <span><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Processing</span>
                            </template>
                        </button>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full sticky top-24 overflow-hidden flex flex-col">
                    <div class="bg-slate-900 p-6 sm:p-8 text-center text-white relative">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-rose-500/10 rounded-full blur-2xl"></div>
                        <div class="absolute bottom-0 left-0 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl"></div>
                        
                        <div class="relative z-10">
                            <div class="inline-block bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4 text-slate-300 shadow-inner" x-text="selectedDateString"></div>
                            <template x-if="baliData">
                                <div>
                                    <h3 class="text-3xl font-black mb-3 tracking-tight text-white drop-shadow-md" x-text="baliData.saptawara + ' ' + baliData.pancawara"></h3>
                                    <div class="flex items-center justify-center gap-2 text-xs font-bold uppercase tracking-wider text-slate-400">
                                        <span class="bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 text-slate-200">Wuku <span x-text="baliData.wuku" class="text-rose-400 ml-1"></span></span>
                                        <span class="bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 text-slate-200">Saka <span x-text="baliData.saka" class="text-emerald-400 ml-1"></span></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="p-5 sm:p-6 flex-grow flex flex-col gap-4 bg-slate-50/30">
                        <template x-if="baliData">
                            <div class="space-y-4">
                                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center justify-between">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-xl bg-amber-50 border border-amber-100 text-amber-500 flex items-center justify-center shadow-sm text-xl">
                                            <i class="fa-solid fa-moon"></i>
                                        </div>
                                        <div>
                                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Sasih</div>
                                            <div class="font-black text-slate-800 text-lg leading-none" x-text="baliData.sasih"></div>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5" x-text="baliData.fase"></div>
                                        <div class="font-black text-slate-800 text-lg leading-none" x-text="baliData.angkaFase"></div>
                                    </div>
                                </div>

                                <template x-if="baliData.purnama !== ''">
                                    <div class="bg-gradient-to-r from-rose-600 to-rose-700 text-white rounded-xl p-3.5 text-center font-bold text-sm tracking-widest shadow-md shadow-rose-600/20 uppercase flex items-center justify-center gap-3">
                                        <i class="fa-solid fa-star text-yellow-300"></i>
                                        <span x-text="baliData.purnama"></span>
                                        <i class="fa-solid fa-star text-yellow-300"></i>
                                    </div>
                                </template>

                                <div class="grid grid-cols-2 gap-3 mt-2">
                                    <div class="p-3.5 bg-white rounded-xl border border-slate-200 text-center shadow-sm">
                                        <div class="text-[10px] text-slate-400 uppercase font-extrabold tracking-widest mb-1.5">Triwara</div>
                                        <div class="text-slate-800 font-black text-sm" x-text="baliData.triwara"></div>
                                    </div>
                                    <div class="p-3.5 bg-white rounded-xl border border-slate-200 text-center shadow-sm">
                                        <div class="text-[10px] text-slate-400 uppercase font-extrabold tracking-widest mb-1.5">Sadwara</div>
                                        <div class="text-slate-800 font-black text-sm" x-text="baliData.sadwara"></div>
                                    </div>
                                    <div class="p-3.5 bg-white rounded-xl border border-slate-200 text-center shadow-sm">
                                        <div class="text-[10px] text-slate-400 uppercase font-extrabold tracking-widest mb-1.5">Astawara</div>
                                        <div class="text-slate-800 font-black text-sm" x-text="baliData.astawara"></div>
                                    </div>
                                    <div class="p-3.5 bg-white rounded-xl border border-slate-200 text-center shadow-sm">
                                        <div class="text-[10px] text-slate-400 uppercase font-extrabold tracking-widest mb-1.5">Sangawara</div>
                                        <div class="text-slate-800 font-black text-sm" x-text="baliData.sangawara"></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-12 pt-8 pb-4 border-t border-slate-200 flex flex-col items-center gap-2 text-center">
            <p class="text-sm text-slate-500 font-medium">
                Developed by <span class="font-black text-slate-800">Agung Developer</span>
            </p>
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Preserving Balinese Culture through Code</p>
        </footer>
    </main>

    <script>
        const WUKU = ["", "Sinta", "Landep", "Ukir", "Kulantir", "Tolu", "Gumbreg", "Wariga", "Warigadean", "Julungwangi", "Sungsang", "Dungulan", "Kuningan", "Langkir", "Medangsia", "Pujut", "Pahang", "Krulut", "Merakih", "Tambir", "Medangkungan", "Matal", "Uye", "Menail", "Prangbakat", "Bala", "Ugu", "Wayang", "Kelawu", "Dukut", "Watugunung"]
        const EKAWARA = ["", "Luang", ""]
        const DWIWARA = ["", "Menga", "Pepet"]
        const TRIWARA = ["", "Pasah", "Beteng", "Kajeng"]
        const CATURWARA = ["", "Sri", "Laba", "Jaya", "Mandala"]
        const PANCAWARA = ["", "Umanis", "Paing", "Pon", "Wage", "Kliwon"]
        const SADWARA = ["", "Tungleh", "Aryang", "Wurukung", "Paniron", "Was", "Maulu"]
        const SAPTAWARA = ["Redite", "Soma", "Anggara", "Buda", "Wraspati", "Sukra", "Saniscara"]
        const ASTAWARA = ["", "Sri", "Indra", "Guru", "Yama", "Ludra", "Brahma", "Kala", "Uma"]
        const SANGAWARA = ["", "Dangu", "Jagur", "Gigis", "Nohan", "Ogan", "Erangan", "Urungan", "Tulus", "Dadi"]
        const DASAWARA = ["", "Pandita", "Pati", "Suka", "Duka", "Sri", "Manu", "Manusa", "Raja", "Dewa", "Raksasa"]
        const SASIH = ["", "Kasa", "Karo", "Katiga", "Kapat", "Kalima", "Kanem", "Kapitu", "Kawalu", "Kasanga", "Kadasa", "Jyestha", "Sadha"]
        const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"]

        document.addEventListener('alpine:init', () => {
            Alpine.data('kalenderApp', () => ({
                viewMonth: new Date().getMonth(),
                viewYear: new Date().getFullYear(),
                activeMonth: new Date().getMonth(),
                activeYear: new Date().getFullYear(),
                days: [],
                selectedDay: new Date().getDate(),
                baliData: null,
                isGenerating: false,
                csvStartYear: new Date().getFullYear(),
                csvEndYear: new Date().getFullYear() + 15,
                MONTHS: MONTHS,

                init() {
                    this.applyFilter()
                },

                applyFilter() {
                    if (!this.viewYear || isNaN(this.viewYear)) this.viewYear = new Date().getFullYear()
                    this.activeMonth = parseInt(this.viewMonth)
                    this.activeYear = parseInt(this.viewYear)
                    
                    let daysInMonth = new Date(this.activeYear, this.activeMonth + 1, 0).getDate()
                    if (this.selectedDay > daysInMonth) this.selectedDay = daysInMonth
                    
                    this.generateGrid()
                    this.selectDate(this.selectedDay)
                },
                
                generateGrid() {
                    let firstDay = new Date(this.activeYear, this.activeMonth, 1).getDay()
                    let daysInMonth = new Date(this.activeYear, this.activeMonth + 1, 0).getDate()
                    this.days = []
                    for(let i = 0; i < firstDay; i++) this.days.push(null)
                    for(let i = 1; i <= daysInMonth; i++) this.days.push(i)
                },
                
                prevMonth() {
                    if(this.viewMonth === 0) { this.viewMonth = 11; this.viewYear-- } 
                    else { this.viewMonth-- }
                    this.applyFilter()
                },
                
                nextMonth() {
                    if(this.viewMonth === 11) { this.viewMonth = 0; this.viewYear++ } 
                    else { this.viewMonth++ }
                    this.applyFilter()
                },

                isSelected(d) {
                    return this.selectedDay === d
                },
                
                get selectedDateString() {
                    return `${this.selectedDay} ${MONTHS[this.activeMonth]} ${this.activeYear}`
                },

                selectDate(d) {
                    if(!d) return
                    this.selectedDay = d
                    let m = String(this.activeMonth + 1).padStart(2, '0')
                    let dayStr = String(d).padStart(2, '0')
                    let sc = new KalenderBaliAgung(`${this.activeYear}-${m}-${dayStr}`)
                    
                    this.baliData = {
                        saka: sc.tahunSaka,
                        wuku: WUKU[sc.noWuku] || "-",
                        pancawara: PANCAWARA[sc.noPancawara] || "-",
                        saptawara: SAPTAWARA[sc.noSaptawara] || "-",
                        sasih: (sc.isNampih ? "Mala " : "") + (SASIH[sc.noSasih] || "-"),
                        fase: sc.isPangelong ? "Pengelong" : "Penanggal",
                        angkaFase: sc.penanggalStr,
                        purnama: sc.statusPurnama || "",
                        triwara: TRIWARA[sc.noTriwara] || "-",
                        sadwara: SADWARA[sc.noSadwara] || "-",
                        astawara: ASTAWARA[sc.noAstawara] || "-",
                        sangawara: SANGAWARA[sc.noSangawara] || "-"
                    }
                },

                downloadCSV() {
                    this.isGenerating = true
                    setTimeout(() => {
                        let csv = "tanggal,bulan,tahun,wuku,eka_wara,dwi_wara,tri_wara,catur_wara,panca_wara,sad_wara,sapta_wara,asta_wara,sanga_wara,dasa_wara,sasih,penanggal,pengelong,status_purnama,status_mala\n"
                        let start = new Date(Date.UTC(this.csvStartYear, 0, 1))
                        let end = new Date(Date.UTC(this.csvEndYear, 11, 31))

                        while(start <= end) {
                            let d = start.getUTCDate()
                            let m = start.getUTCMonth() + 1
                            let y = start.getUTCFullYear()
                            let dateStr = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
                            let sc = new KalenderBaliAgung(dateStr)
                            
                            let statusMala = sc.isNampih ? `Mala ${SASIH[sc.noSasih]}` : ""
                            let penanggal = sc.isPangelong ? "0" : sc.penanggalStr
                            let pengelong = sc.isPangelong ? sc.penanggalStr : "0"

                            csv += `${d},${m},${y},${WUKU[sc.noWuku]||""},${EKAWARA[sc.noEkawara]||""},${DWIWARA[sc.noDwiwara]||""},${TRIWARA[sc.noTriwara]||""},${CATURWARA[sc.noCaturwara]||""},${PANCAWARA[sc.noPancawara]||""},${SADWARA[sc.noSadwara]||""},${SAPTAWARA[sc.noSaptawara]||""},${ASTAWARA[sc.noAstawara]||""},${SANGAWARA[sc.noSangawara]||""},${DASAWARA[sc.noDasawara]||""},${SASIH[sc.noSasih]||""},${penanggal},${pengelong},${sc.statusPurnama||""},${statusMala}\n`
                            start.setUTCDate(start.getUTCDate() + 1)
                        }

                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
                        const link = document.createElement("a")
                        link.setAttribute("href", URL.createObjectURL(blob))
                        link.setAttribute("download", `wariga_dataset_${this.csvStartYear}_${this.csvEndYear}.csv`)
                        link.style.visibility = 'hidden'
                        document.body.appendChild(link)
                        link.click()
                        document.body.removeChild(link)

                        this.isGenerating = false
                    }, 50)
                }
            }))
        })
    </script>
</body>
</html>
